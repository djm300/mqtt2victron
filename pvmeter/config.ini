[DEFAULT]
device_name = Shelly PM Mini Gen3

; Device VRM instance
; default: 100
device_instance = 100

; used when no voltage is received
voltage = 230

; used when no frequency is received
frequency = 50


[PV]
; Max rated power (in Watts) of the inverter
max = 3680

; position (connected input/output) of the PV inverter
; 0 = AC input 1 (select this if you don't have a MultiPlus or Quattro)
; 1 = AC output
; 2 = AC input 2
position = 0


[EVCHARGER]
; Enable the EV charger DBus service
enabled = false

; Device name shown in Victron
device_name = MQTT EV Charger

; Device VRM instance
; default: 11
device_instance = 11

; Default voltage used when MQTT payload does not provide a value
voltage = 230

; Default frequency used when MQTT payload does not provide a value
frequency = 50

; Maximum charging current in A
max_current = 32

; position of the EV charger
; 0 = AC output
; 1 = AC input
position = 0

; Optional model string
model = AC22NS

; MQTT root topic for the EV charger payload
; The script accepts either:
; - a JSON payload on this topic, or
; - flat subtopics such as topic/power, topic/current, topic/status, ...
topic = power/evcharger


[MQTT]
broker_address = 192.168.0.24
broker_port = 1883
broker_user =
broker_password =
mqtt_name = VenusOS_MQTTPV
connection_name = MQTT
topic = power/pvmeter
